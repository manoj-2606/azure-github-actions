name: Azure Login and RG Creation Test

on:
  workflow_dispatch:

jobs:
  rg-test:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name rg-github-actions-demo \
            --location centralindia

      - name: Verify Resource Group
        run: |
          az group show \
            --name rg-github-actions-demo
