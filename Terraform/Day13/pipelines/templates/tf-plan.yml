steps:
  - checkout: self

  - task: TerraformInstaller@1
    displayName: Install Terraform
    inputs:
      terraformVersion: "1.7.5"

  - task: TerraformTaskV4@4
    displayName: Terraform Init
    inputs:
      provider: azurerm
      command: init
      workingDirectory: $(TF_WORKING_DIR)
      backendServiceArm: $(SERVICE_CONNECTION)
      backendAzureRmResourceGroupName: $(TF_STATE_RG)
      backendAzureRmStorageAccountName: $(TF_STATE_SA)
      backendAzureRmContainerName: $(TF_STATE_CONTAINER)
      backendAzureRmKey: $(TF_STATE_KEY)

  - task: TerraformTaskV4@4
    displayName: Terraform Plan
    inputs:
      provider: azurerm
      command: plan
      workingDirectory: $(TF_WORKING_DIR)
      environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
      commandOptions: "-out=$(Pipeline.Workspace)/day13.tfplan"

  - publish: $(Pipeline.Workspace)/day13.tfplan
    artifact: tfplan
    displayName: Publish Plan Artifact