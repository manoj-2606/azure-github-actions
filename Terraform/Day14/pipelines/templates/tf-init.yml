steps:
  - checkout: self

  - script: |
      curl -sLo terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      unzip -o terraform.zip -d /usr/local/bin
      terraform version
    displayName: Install Terraform

  - task: AzureCLI@2
    displayName: Bootstrap Backend Storage
    inputs:
      azureSubscription: $(SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az group create --name $(TF_STATE_RG) --location $(ARM_LOCATION) --output none || true
        az storage account create --name $(TF_STATE_SA) --resource-group $(TF_STATE_RG) --location $(ARM_LOCATION) --sku Standard_LRS --kind StorageV2 --min-tls-version TLS1_2 --output none || true
        az storage container create --name $(TF_STATE_CONTAINER) --account-name $(TF_STATE_SA) --auth-mode login --output none || true
        echo "Backend ready"

  - task: AzureCLI@2
    displayName: Terraform Init
    inputs:
      azureSubscription: $(SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      workingDirectory: $(TF_WORKING_DIR)
      inlineScript: |
        export ARM_USE_OIDC=true
        export ARM_OIDC_TOKEN=$idToken
        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_TENANT_ID=$tenantId
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        terraform init \
          -backend-config="resource_group_name=$(TF_STATE_RG)" \
          -backend-config="storage_account_name=$(TF_STATE_SA)" \
          -backend-config="container_name=$(TF_STATE_CONTAINER)" \
          -backend-config="key=$(TF_STATE_KEY)" \
          -reconfigure