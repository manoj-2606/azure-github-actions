parameters:
  - name: workingDir
    type: string
  - name: tfVersion
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: armClientId
    type: string
  - name: armTenantId
    type: string
  - name: armSubscriptionId
    type: string

steps:

  - task: Bash@3
    displayName: "Install Terraform 1.10.3"
    inputs:
      targetType: inline
      script: |
        wget -q https://releases.hashicorp.com/terraform/1.10.3/terraform_1.10.3_linux_amd64.zip
        unzip -o terraform_1.10.3_linux_amd64.zip
        sudo mv terraform /usr/local/bin/terraform
        terraform version

  - task: TerraformTaskV4@4
    displayName: "Terraform Init"
    inputs:
      provider: azurerm
      command: init
      workingDirectory: ${{ parameters.workingDir }}
      backendServiceArm: "azure-service-connection"
      backendAzureRmResourceGroupName: ${{ parameters.backendResourceGroup }}
      backendAzureRmStorageAccountName: ${{ parameters.backendStorageAccount }}
      backendAzureRmContainerName: ${{ parameters.backendContainer }}
      backendAzureRmKey: "day12.terraform.tfstate"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  - task: TerraformTaskV4@4
    displayName: "Terraform Validate"
    inputs:
      provider: azurerm
      command: validate
      workingDirectory: ${{ parameters.workingDir }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  - task: TerraformTaskV4@4
    displayName: "Terraform Plan"
    inputs:
      provider: azurerm
      command: plan
      workingDirectory: ${{ parameters.workingDir }}
      commandOptions: >
        -out=tfplan
        -var="client_id=${{ parameters.armClientId }}"
        -var="tenant_id=${{ parameters.armTenantId }}"
        -var="subscription_id=${{ parameters.armSubscriptionId }}"
      environmentServiceNameAzureRM: "azure-service-connection"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  - task: PublishPipelineArtifact@1
    displayName: "Publish Terraform Plan"
    inputs:
      targetPath: "${{ parameters.workingDir }}/tfplan"
      artifact: tfplan
      publishLocation: pipeline