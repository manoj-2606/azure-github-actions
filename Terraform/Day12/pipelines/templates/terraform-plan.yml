parameters:
  - name: workingDir
    type: string
  - name: tfVersion
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: armClientId
    type: string
  - name: armTenantId
    type: string
  - name: armSubscriptionId
    type: string

steps:

  # ── Install Terraform ─────────────────────────────────────
  - task: TerraformInstaller@1
    displayName: "Install Terraform ${{ parameters.tfVersion }}"
    inputs:
      terraformVersion: ${{ parameters.tfVersion }}

  # ── Terraform Init ────────────────────────────────────────
  - task: TerraformTaskV4@4
    displayName: "Terraform Init"
    inputs:
      provider: azurerm
      command: init
      workingDirectory: ${{ parameters.workingDir }}
      backendServiceArm: "day12-service-connection"
      # day12-service-connection = name of your Azure DevOps service connection
      backendAzureRmResourceGroupName: ${{ parameters.backendResourceGroup }}
      backendAzureRmStorageAccountName: ${{ parameters.backendStorageAccount }}
      backendAzureRmContainerName: ${{ parameters.backendContainer }}
      backendAzureRmKey: "day12.terraform.tfstate"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  # ── Terraform Validate ────────────────────────────────────
  - task: TerraformTaskV4@4
    displayName: "Terraform Validate"
    inputs:
      provider: azurerm
      command: validate
      workingDirectory: ${{ parameters.workingDir }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  # ── Terraform Plan ────────────────────────────────────────
  - task: TerraformTaskV4@4
    displayName: "Terraform Plan"
    inputs:
      provider: azurerm
      command: plan
      workingDirectory: ${{ parameters.workingDir }}
      commandOptions: >
        -out=tfplan
        -var="client_id=${{ parameters.armClientId }}"
        -var="tenant_id=${{ parameters.armTenantId }}"
        -var="subscription_id=${{ parameters.armSubscriptionId }}"
      environmentServiceNameAzureRM: "day12-service-connection"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  # ── Publish plan file so Apply stage can use it ───────────
  - task: PublishPipelineArtifact@1
    displayName: "Publish Terraform Plan"
    inputs:
      targetPath: "${{ parameters.workingDir }}/tfplan"
      artifact: tfplan
      publishLocation: pipeline