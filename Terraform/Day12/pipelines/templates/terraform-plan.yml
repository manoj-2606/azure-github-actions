parameters:
  - name: workingDir
    type: string
  - name: tfVersion
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: armClientId
    type: string
  - name: armTenantId
    type: string
  - name: armSubscriptionId
    type: string

steps:

  - task: Bash@3
    displayName: "Install Terraform 1.10.3"
    inputs:
      targetType: inline
      script: |
        wget -q https://releases.hashicorp.com/terraform/1.10.3/terraform_1.10.3_linux_amd64.zip
        unzip -o terraform_1.10.3_linux_amd64.zip
        sudo mv terraform /usr/local/bin/terraform
        terraform version

  # ── Fetch OIDC token from service connection ──────────────
  - task: AzureCLI@2
    displayName: "Get OIDC Token"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        echo "##vso[task.setvariable variable=ARM_OIDC_TOKEN;issecret=true]$idToken"

  - task: Bash@3
    displayName: "Terraform Init"
    inputs:
      targetType: inline
      workingDirectory: $(Build.SourcesDirectory)/${{ parameters.workingDir }}
      script: |
        terraform init \
          -backend-config="resource_group_name=${{ parameters.backendResourceGroup }}" \
          -backend-config="storage_account_name=${{ parameters.backendStorageAccount }}" \
          -backend-config="container_name=${{ parameters.backendContainer }}" \
          -backend-config="key=day12.terraform.tfstate"
    env:
      ARM_USE_OIDC: true
      ARM_OIDC_TOKEN: $(ARM_OIDC_TOKEN)
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  - task: Bash@3
    displayName: "Terraform Validate"
    inputs:
      targetType: inline
      workingDirectory: $(Build.SourcesDirectory)/${{ parameters.workingDir }}
      script: terraform validate
    env:
      ARM_USE_OIDC: true
      ARM_OIDC_TOKEN: $(ARM_OIDC_TOKEN)
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  - task: Bash@3
    displayName: "Terraform Plan"
    inputs:
      targetType: inline
      workingDirectory: $(Build.SourcesDirectory)/${{ parameters.workingDir }}
      script: |
        terraform plan \
          -out=tfplan \
          -var="client_id=${{ parameters.armClientId }}" \
          -var="tenant_id=${{ parameters.armTenantId }}" \
          -var="subscription_id=${{ parameters.armSubscriptionId }}"
    env:
      ARM_USE_OIDC: true
      ARM_OIDC_TOKEN: $(ARM_OIDC_TOKEN)
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  - task: PublishPipelineArtifact@1
    displayName: "Publish Terraform Plan"
    inputs:
      targetPath: "$(Build.SourcesDirectory)/${{ parameters.workingDir }}/tfplan"
      artifact: tfplan
      publishLocation: pipeline