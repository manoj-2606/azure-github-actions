parameters:
  - name: workingDir
    type: string
  - name: tfVersion
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: armClientId
    type: string
  - name: armTenantId
    type: string
  - name: armSubscriptionId
    type: string

steps:

  - task: TerraformInstaller@1
    displayName: "Install Terraform"
    inputs:
      terraformVersion: "latest"

  - task: TerraformTaskV4@4
    displayName: "Terraform Init"
    inputs:
      provider: azurerm
      command: init
      workingDirectory: ${{ parameters.workingDir }}
      backendServiceArm: "azure-service-connection"
      backendAzureRmResourceGroupName: ${{ parameters.backendResourceGroup }}
      backendAzureRmStorageAccountName: ${{ parameters.backendStorageAccount }}
      backendAzureRmContainerName: ${{ parameters.backendContainer }}
      backendAzureRmKey: "day12.terraform.tfstate"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  - task: TerraformTaskV4@4
    displayName: "Terraform Destroy"
    inputs:
      provider: azurerm
      command: destroy
      workingDirectory: ${{ parameters.workingDir }}
      commandOptions: >
        -auto-approve
        -var="client_id=${{ parameters.armClientId }}"
        -var="tenant_id=${{ parameters.armTenantId }}"
        -var="subscription_id=${{ parameters.armSubscriptionId }}"
      environmentServiceNameAzureRM: "azure-service-connection"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}