parameters:
  - name: workingDir
    type: string
  - name: tfVersion
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: armClientId
    type: string
  - name: armTenantId
    type: string
  - name: armSubscriptionId
    type: string

steps:

  # ── Install Terraform ─────────────────────────────────────
  - task: TerraformInstaller@1
    displayName: "Install Terraform ${{ parameters.tfVersion }}"
    inputs:
      terraformVersion: ${{ parameters.tfVersion }}

  # ── Terraform Init ────────────────────────────────────────
  - task: TerraformTaskV4@4
    displayName: "Terraform Init"
    inputs:
      provider: azurerm
      command: init
      workingDirectory: ${{ parameters.workingDir }}
      backendServiceArm: "azure-service-connection"
      backendAzureRmResourceGroupName: ${{ parameters.backendResourceGroup }}
      backendAzureRmStorageAccountName: ${{ parameters.backendStorageAccount }}
      backendAzureRmContainerName: ${{ parameters.backendContainer }}
      backendAzureRmKey: "day12.terraform.tfstate"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}

  # ── Terraform Destroy ─────────────────────────────────────
  - task: TerraformTaskV4@4
    displayName: "Terraform Destroy"
    inputs:
      provider: azurerm
      command: destroy
      workingDirectory: ${{ parameters.workingDir }}
      commandOptions: >
        -auto-approve
        -var="client_id=${{ parameters.armClientId }}"
        -var="tenant_id=${{ parameters.armTenantId }}"
        -var="subscription_id=${{ parameters.armSubscriptionId }}"
      environmentServiceNameAzureRM: "day12-service-connection"
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ parameters.armClientId }}
      ARM_TENANT_ID: ${{ parameters.armTenantId }}
      ARM_SUBSCRIPTION_ID: ${{ parameters.armSubscriptionId }}
# ```

# ---

# ## ✅ STEP 7 Complete — 4 files, copy-paste ready

# | File | Paste into |
# |---|---|
# | `azure-pipelines.yml` | `pipelines/azure-pipelines.yml` |
# | `terraform-plan.yml` | `pipelines/templates/terraform-plan.yml` |
# | `terraform-apply.yml` | `pipelines/templates/terraform-apply.yml` |
# | `terraform-destroy.yml` | `pipelines/templates/terraform-destroy.yml` |

# **4 things to understand:**

# `day12-service-connection` — this name must exactly match the service connection you create in Azure DevOps under **Project Settings → Service Connections**. It must be an Azure Resource Manager connection with workload identity federation (OIDC).

# `day12-vars` variable group — create this in **Pipelines → Library → Variable Groups**. Add `ARM_CLIENT_ID`, `ARM_TENANT_ID`, `ARM_SUBSCRIPTION_ID`, `BACKEND_RESOURCE_GROUP`, `BACKEND_STORAGE_ACCOUNT`, `BACKEND_CONTAINER` as variables.

# Apply stage uses `deployment` job type not regular `job` — this is required to link to an **environment** in Azure DevOps so you can add approval gates before apply runs.

# Destroy only triggers when `BUILD_DESTROY=true` — when you manually run the pipeline, add this variable. It will never fire accidentally on a normal push.

