trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

variables:
  - group: day12-vars
  # Variable group must have these in Azure DevOps Library:
  # ARM_CLIENT_ID, ARM_TENANT_ID, ARM_SUBSCRIPTION_ID
  # BACKEND_RESOURCE_GROUP, BACKEND_STORAGE_ACCOUNT, BACKEND_CONTAINER

  - name: TF_WORKING_DIR
    value: terraform
  - name: TF_VERSION
    value: 1.7.5

stages:
  # ──────────────────────────────────────────────────────────
  # STAGE 1 — PLAN (runs on every push and PR)
  # ──────────────────────────────────────────────────────────
  - stage: Plan
    displayName: "Terraform Plan"
    jobs:
      - job: TerraformPlan
        displayName: "Init + Validate + Plan"
        pool:
          vmImage: ubuntu-latest
        steps:
          - template: templates/terraform-plan.yml
            parameters:
              workingDir: $(TF_WORKING_DIR)
              tfVersion: $(TF_VERSION)
              backendResourceGroup: $(BACKEND_RESOURCE_GROUP)
              backendStorageAccount: $(BACKEND_STORAGE_ACCOUNT)
              backendContainer: $(BACKEND_CONTAINER)
              armClientId: $(ARM_CLIENT_ID)
              armTenantId: $(ARM_TENANT_ID)
              armSubscriptionId: $(ARM_SUBSCRIPTION_ID)

  # ──────────────────────────────────────────────────────────
  # STAGE 2 — APPLY (runs only on push to main, not on PR)
  # ──────────────────────────────────────────────────────────
  - stage: Apply
    displayName: "Terraform Apply"
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: TerraformApply
        displayName: "Apply Infrastructure"
        pool:
          vmImage: ubuntu-latest
        environment: "day12-dev"
        # environment in Azure DevOps lets you add approval gates
        # Go to Pipelines → Environments → day12-dev → Approvals
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/terraform-apply.yml
                  parameters:
                    workingDir: $(TF_WORKING_DIR)
                    tfVersion: $(TF_VERSION)
                    backendResourceGroup: $(BACKEND_RESOURCE_GROUP)
                    backendStorageAccount: $(BACKEND_STORAGE_ACCOUNT)
                    backendContainer: $(BACKEND_CONTAINER)
                    armClientId: $(ARM_CLIENT_ID)
                    armTenantId: $(ARM_TENANT_ID)
                    armSubscriptionId: $(ARM_SUBSCRIPTION_ID)

  # ──────────────────────────────────────────────────────────
  # STAGE 3 — DESTROY (manual trigger only)
  # ──────────────────────────────────────────────────────────
  - stage: Destroy
    displayName: "Terraform Destroy"
    dependsOn: []
    condition: eq(variables['BUILD_DESTROY'], 'true')
    # To trigger destroy: run pipeline with variable BUILD_DESTROY=true
    # Never runs automatically — must be set manually
    jobs:
      - deployment: TerraformDestroy
        displayName: "Destroy Infrastructure"
        pool:
          vmImage: ubuntu-latest
        environment: "day12-destroy"
        # Separate environment so you can add a mandatory approval gate
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/terraform-destroy.yml
                  parameters:
                    workingDir: $(TF_WORKING_DIR)
                    tfVersion: $(TF_VERSION)
                    backendResourceGroup: $(BACKEND_RESOURCE_GROUP)
                    backendStorageAccount: $(BACKEND_STORAGE_ACCOUNT)
                    backendContainer: $(BACKEND_CONTAINER)
                    armClientId: $(ARM_CLIENT_ID)
                    armTenantId: $(ARM_TENANT_ID)
                    armSubscriptionId: $(ARM_SUBSCRIPTION_ID)
